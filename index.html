<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: white;
}

.container {
  margin-top: 10%;
}

img {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  border: 5px solid white;
  margin-top: 20px;
}

button {
  margin-top: 30px; 
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  border-radius: 25px;
  background: white;
  color: #ff4b5c;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4b5c;
  color: white;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- 🎉 PAGE 1 -->
<div id="page1" class="container">
  <h1>Happy Birthday My Love ❤️</h1>
  <img src="Tanii_1.jpeg">
  <p>You make my world brighter every day ✨</p>

  <button onclick="startJourney()">Start Journey 💫</button>
</div>

<!-- ❓ PAGE 2 -->
<div id="page2" class="container hidden">

  <div style="display:flex; justify-content:space-between; align-items:center; padding: 0 50px;">

    <!-- Left Image -->
    <img src="Tanii_2.jpeg" style="width:300px; height:auto; transform: rotate(-10deg);">

    <!-- Question Section -->
    <div>
      <h2>Answer this to continue 😏</h2>
      <p><b>Which one is bigger?</b></p>

      <button onclick="correctAnswer()">Infinite</button><br>
      <button onclick="wrongAnswer()">Infinitesimal</button>
    </div>

    <!-- Right Image -->
    <img src="Tanii_3.jpeg" style="width:300px; height:auto; transform: rotate(10deg);">

  </div>

</div>

<!-- 😂 WRONG PAGE -->
<div id="wrongPage" class="container hidden">

  <h2>😂 Haha dumb!</h2>

  <!-- Big Image -->
  <img src="Tanii_4.jpeg" style="width:400px; height:auto; margin-top:20px;">

  <p>But anyways… you still deserve to continue ❤️</p>

  <button onclick="goToFinal()">Continue</button>

</div>

<!-- ❤️ FINAL PAGE -->
<div id="finalPage" class="container hidden">
  <h1>💖 You made it 💖</h1>
  <p>
    No matter what answer you choose, <br>
    you’re always the best part of my life ❤️
  </p>
</div>

<script>
function startJourney() {
  document.getElementById("page1").style.display = "none";
  document.getElementById("page2").style.display = "block";
}

function correctAnswer() {
  goToFinal();
}

function wrongAnswer() {
  document.getElementById("page2").style.display = "none";
  document.getElementById("wrongPage").style.display = "block";
}

function goToFinal() {
  document.getElementById("wrongPage").style.display = "none";
  document.getElementById("page2").style.display = "none";
  document.getElementById("finalPage").style.display = "block";
}
</script>

</body>
</html>
