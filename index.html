<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For Someone Special ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: 'Arial', sans-serif;
      text-align: center;
      color: #fff;
    }

    .container {
      margin-top: 10%;
    }

    h1 {
      font-size: 3em;
      animation: fadeIn 2s ease-in-out;
    }

    img {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      margin-top: 20px;
      border: 5px solid white;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      animation: pop 1.5s ease;
    }

    p {
      font-size: 1.5em;
      margin-top: 20px;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    @keyframes pop {
      from {transform: scale(0);}
      to {transform: scale(1);}
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Happy Birthday Tanii ❤️</h1>

    <!-- Replace with her image -->
    <img src="Tanii_1.jpeg" alt="Her Image">

    <p>
      You make my world brighter every day ✨ <br>
      I’m so lucky to have you 💕
    </p>
  </div>

</body>
</html>
